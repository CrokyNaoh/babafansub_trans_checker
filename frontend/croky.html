<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>項目管理界面 - 霸霸組繁中工具</title>
    <link rel="stylesheet" href="/transtool-py/css/style.css">
    <link rel="stylesheet" href="/transtool-py/css/admin.css">
</head>
<body>
    <!-- 置顶 banner -->
    <nav class="top-banner" id="topBanner">
        <span class="banner-title">霸霸組繁中工具</span>
        <span class="banner-desc">管理員控制台</span>
    </nav>

    <!-- 主内容区 -->
    <div class="admin-body">
        <div class="admin-container">
            <!-- 统计 -->
            <div class="stats" id="statsContainer">
                <span class="stats-label">項目統計</span>
                <span class="stats-text" id="statsText">載入中...</span>
            </div>

            <!-- 控制按钮 -->
            <div class="admin-controls">
                <button class="admin-btn refresh-btn" onclick="loadProjects()">刷新項目列表</button>
                <button class="admin-btn reload-config-btn" onclick="reloadConfig()">重新加載配置</button>
            </div>

            <!-- 错误/成功提示 -->
            <div id="errorContainer" class="admin-message error" style="display: none;">
                <span id="errorMessage"></span>
            </div>

            <!-- 加载中 -->
            <div id="loadingContainer" class="loading" style="display: none;">
                <p>正在載入項目列表...</p>
            </div>

            <!-- 项目卡片网格 -->
            <div id="projectsContainer" class="projects-grid" style="display: none;"></div>
        </div>
    </div>

    <script src="/transtool-py/js/projectlist.js"></script>
</body>
</html>
